# Sparse Distillation (Gray-Box) test config
# Mirrors tests/trainers/sparse_distillation_trainer.py
# Note: Uses same model for student and teacher for testing

model:
  name_or_path: Qwen/Qwen2.5-0.5B-Instruct

teacher_model:
  name_or_path: Qwen/Qwen2.5-0.5B-Instruct

loader:
  dtype: bf16
  param_dtype: bf16
  trust_remote_code: true

sharding:
  axis_dims: [1, -1, 1, 1, 1]
  auto_shard_model: true

base_config:
  values:
    freq_max_position_embeddings: 768
    mask_max_position_embeddings: 768
    attn_mechanism: auto
    attn_dtype: bf16
    gradient_checkpointing: ""

mixture:
  informs:
    - type: trl-lib/ultrafeedback_binarized
      split: "train"
  batch_size: 2
  streaming: false

trainer:
  trainer_type: sparse_distillation
  alpha: 0.9
  temperature: 2.0
  top_k_teacher: 20
  learning_rate: 8.0e-6
  num_train_epochs: 1
  total_batch_size: 2
  gradient_accumulation_steps: 2
  max_training_steps: 1024
  max_prompt_length: 256
  max_completion_length: 256
  num_generations_per_prompt: 1
  save_steps: 1000
  save_total_limit: 1
  log_steps: 1
  shuffle_train_dataset: false
  save_directory: ./tmp-files/elarge-tests/sparse_distillation

actions:
  - validate
  - train
